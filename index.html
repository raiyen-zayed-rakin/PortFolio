<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>Raiyen Zayed Rakin — Software Engineer & Researcher</title>
    <meta name="description" content="Portfolio of Raiyen Zayed Rakin — Full-stack developer, AI enthusiast, and published researcher at AIUB. Building digital experiences with React, TypeScript, FastAPI, and Python." />
    <meta name="keywords" content="Raiyen Zayed Rakin, portfolio, software engineer, AIUB, React, TypeScript, FastAPI, AI, researcher, Bangladesh" />
    <meta name="author" content="Raiyen Zayed Rakin" />

    <!-- Open Graph -->
    <meta property="og:title" content="Raiyen Zayed Rakin — Software Engineer & Researcher" />
    <meta property="og:description" content="Full-stack developer & AI researcher crafting digital experiences with React, TypeScript, and Python." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/assets/profile-image.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />

    <!-- Google Fonts: Cinzel (display) + Rajdhani (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Theme flash prevention -->
    <script>
      (function () {
        const saved = localStorage.getItem("portfolio-theme");
        if (saved === "light") {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
